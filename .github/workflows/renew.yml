name: JustRunMy 多账号矩阵续期

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 */2 * *'  # 每两天运行一次

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false # 即使账号1失败，账号2也会继续运行
      matrix:
        # 【配置点】如果你有 3 个号，就改成 ['1', '2', '3']
        account_suffix: ['1', '2']

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            xdotool \
            scrot \
            fonts-noto-cjk
            
      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase aiohttp requests
          seleniumbase install chromedriver
          
      - name: 🚀 运行续期脚本
        env:
          # 自动匹配 EML_1, PWD_1 等
          JUSTRUNMY_EMAIL: ${{ secrets[format('EML_{0}', matrix.account_suffix)] }}
          JUSTRUNMY_PASSWORD: ${{ secrets[format('PWD_{0}', matrix.account_suffix)] }}
          # 修正后的 TG 变量名
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          # 传递当前的后缀给脚本使用
          ACCOUNT_INDEX: ${{ matrix.account_suffix }}
        run: |
          # 增加随机延迟，避免多个账号同时撞上服务器检测
          sleep $((RANDOM % 30))
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python justrunmy_renew.py
            
      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-acc-${{ matrix.account_suffix }}
          path: "*.png"
          retention-days: 3
