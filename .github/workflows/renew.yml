name: JustRunMy 自动续期
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 */2 * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🛠️ 安装环境
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool fonts-noto-cjk
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🚀 运行续期脚本
        env:
          # 对接你指定的 Secrets 名
          EML_1: ${{ secrets.EML_1 }}
          PWD_1: ${{ secrets.PWD_1 }}
          EML_2: ${{ secrets.EML_2 }}
          PWD_2: ${{ secrets.PWD_2 }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python reset_timer.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
